<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>第14帝國リッター・マージ！〜元帥への道〜</title>
    <!-- Matter.js 物理エンジンを読み込み -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/matter-js/0.19.0/matter.min.js"></script>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #1a1a1a;
            color: #ffffff;
            font-family: 'Helvetica Neue', Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            overflow: hidden;
        }

        h1 {
            font-size: 20px;
            margin: 5px 0;
            color: #d4af37;
            text-shadow: 1px 1px 2px #000;
        }

        #game-container {
            position: relative;
            width: 400px;
            height: 650px;
            background: #2c2520;
            border: 4px solid #d4af37;
            border-radius: 10px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.7);
        }

        #score-board {
            position: absolute;
            top: 10px;
            left: 10px;
            font-size: 18px;
            font-weight: bold;
            background: rgba(0, 0, 0, 0.6);
            padding: 5px 10px;
            border-radius: 5px;
            border: 1px solid #555;
            z-index: 10;
        }

        #next-preview {
            position: absolute;
            top: 10px;
            right: 10px;
            font-size: 14px;
            background: rgba(0, 0, 0, 0.6);
            padding: 5px 10px;
            border-radius: 5px;
            border: 1px solid #555;
            z-index: 10;
            text-align: center;
        }

        #game-canvas {
            width: 100%;
            height: 100%;
        }

        #game-over-screen {
            display: none;
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.85);
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 20;
            border-radius: 6px;
        }

        #game-over-screen h2 {
            color: #ff4d4d;
            font-size: 32px;
            margin-bottom: 10px;
        }

        #game-over-screen p {
            font-size: 18px;
            margin-bottom: 20px;
        }

        #restart-btn {
            background: #d4af37;
            color: #000;
            border: none;
            padding: 10px 20px;
            font-size: 16px;
            font-weight: bold;
            border-radius: 5px;
            cursor: pointer;
            transition: background 0.2s;
        }

        #restart-btn:hover {
            background: #fff;
        }

        #guide {
            margin-top: 8px;
            font-size: 12px;
            color: #aaa;
            text-align: center;
            max-width: 400px;
        }
    </style>
</head>
<body>

    <h1>🎖️ 第14帝國リッター・マージ！〜元帥への道〜</h1>
    
    <div id="game-container">
        <div id="score-board">SCORE: <span id="score-value">0</span></div>
        <div id="next-preview">NEXT:<br><span id="next-name" style="font-weight:bold;">???</span></div>
        
        <div id="game-over-screen">
            <h2>作戦失敗 (GAME OVER)</h2>
            <p>最終得点: <span id="final-score">0</span></p>
            <button id="restart-btn" onclick="resetGame()">再出撃する</button>
        </div>

        <canvas id="game-canvas"></canvas>
    </div>

    <div id="guide">
        【遊び方】画面内をクリック/タップした場所にリッターが落ちます。<br>
        同じ階級がくっつくと進化！武藤中尉(Lv.1)から楠本元帥(Lv.9)を目指せ！
    </div>

<script>
// --- ゲームデータ定義 ---
const EVOLUTION_LINE = [
    { level: 1, rank: "中尉", radius: 25, score: 10, characters: [{ name: "武藤優作", color: "#cca43b", sign: "♒" }] },
    { level: 2, rank: "大尉", radius: 33, score: 20, characters: [{ name: "長沢環", color: "#a67c52", sign: "♈" }, { name: "有馬竜之介", color: "#315659", sign: "♍" }] },
    { level: 3, rank: "少佐", radius: 42, score: 40, characters: [{ name: "風間利之", color: "#b23a48", sign: "♏" }, { name: "秋山祐", color: "#df7a27", sign: "♊" }] },
    { level: 4, rank: "中佐", radius: 52, score: 80, characters: [{ name: "星野和臣", color: "#ded686", sign: "♈" }, { name: "加納友緒", color: "#e3db9a", sign: "♑" }] },
    { level: 5, rank: "大佐", radius: 63, score: 160, characters: [{ name: "草薙護", color: "#466060", sign: "♑" }, { name: "春木亮太朗", color: "#d18ca4", sign: "♒" }] },
    { level: 6, rank: "少将", radius: 75, score: 320, characters: [{ name: "鳴海健一", color: "#eadaa2", sign: "♏" }, { name: "天崎一桂", color: "#f0e6bd", sign: "♏" }] },
    { level: 7, rank: "中将", radius: 88, score: 640, characters: [{ name: "定光寺輝信", color: "#c94a53", sign: "♌" }] },
    { level: 8, rank: "大将", radius: 102, score: 1280, characters: [{ name: "立花馨", color: "#7c7c7c", sign: "♈" }] },
    { level: 9, rank: "帝國元帥", radius: 120, score: 2560, characters: [{ name: "楠本柊生", color: "#256eff", sign: "♑" }] }
];

// --- 物理エンジン設定 ---
const { Engine, Render, Runner, Bodies, Composite, Body, Events } = Matter;

let engine, render, runner;
let score = 0;
let isGameOver = false;
let nextLevel = 1; 
let canDrop = true;
let currentDroppingBody = null;

const container = document.getElementById("game-container");
const canvas = document.getElementById("game-canvas");
const width = 400;
const height = 650;
const deadlineY = 120; // このラインを超えて数秒留まるとゲームオーバー

function initGame() {
    // エンジン生成
    engine = Engine.create({ gravity: { y: 1.2 } });
    
    // レンダラー設定
    render = Render.create({
        canvas: canvas,
        engine: engine,
        options: {
            width: width,
            height: height,
            background: "#2c2520",
            wireframes: false
        }
    });
    
    Render.run(render);
    runner = Runner.run(engine);

    // 壁の作成（左、右、底）
    const wallOptions = { isStatic: true, render: { fillStyle: "#5d4e43" } };
    const ground = Bodies.rectangle(width / 2, height + 30, width, 80, wallOptions);
    const leftWall = Bodies.rectangle(-30, height / 2, 80, height, wallOptions);
    const rightWall = Bodies.rectangle(width + 30, height / 2, 80, height, wallOptions);
    
    Composite.add(engine.world, [ground, leftWall, rightWall]);

    // 衝突イベント登録
    Events.on(engine, 'collisionStart', handleCollisions);
    
    // 毎フレームのチェック（ゲームオーバー判定用）
    Events.on(engine, 'afterUpdate', checkGameOverLine);

    score = 0;
    isGameOver = false;
    canDrop = true;
    document.getElementById("score-value").innerText = score;
    document.getElementById("game-over-screen").style.display = "none";
    
    determineNext();
    drawInitialGuideLine();
}

// 次に落ちてくるリッターを決定
function determineNext() {
    // プレイヤーが落とせるのは基本Lv1〜Lv3（中尉、大尉、少佐）
    nextLevel = Math.floor(Math.random() * 3) + 1;
    const stage = EVOLUTION_LINE[nextLevel - 1];
    const charChoice = stage.characters[Math.floor(Math.random() * stage.characters.length)];
    document.getElementById("next-name").innerText = `${charChoice.name}\n(${stage.rank})`;
    document.getElementById("next-name").style.color = charChoice.color;
}

// クリックでリッターを投下
container.addEventListener("click", (e) => {
    if (!canDrop || isGameOver) return;
    
    // コンテナに対するクリック座標を取得
    const rect = container.getBoundingClientRect();
    let clickX = e.clientX - rect.left;
    
    // 壁に埋まらないようにクランプ
    const stage = EVOLUTION_LINE[nextLevel - 1];
    const minX = stage.radius + 5;
    const maxX = width - stage.radius - 5;
    if (clickX < minX) clickX = minX;
    if (clickX > maxX) clickX = maxX;

    // 現在の投下予定のやつを確定して落とす
    dropRitter(clickX, nextLevel);
    
    // クールダウン
    canDrop = false;
    setTimeout(() => {
        if (!isGameOver) {
            canDrop = true;
            determineNext();
        }
    }, 600);
});

// リッターの円体を生成
function createRitterBody(x, y, level) {
    const stage = EVOLUTION_LINE[level - 1];
    // その階級に属するキャラからランダムに1人選ぶ
    const charData = stage.characters[Math.floor(Math.random() * stage.characters.length)];
    
    // カスタム描画ロジックをrender.spriteの代わりに用いる（Canvas APIを直接叩く）
    const ritter = Bodies.circle(x, y, stage.radius, {
        restitution: 0.3, // わずかな弾み
        friction: 0.1,
        label: "ritter",
        plugin: {
            level: level,
            charName: charData.name,
            rank: stage.rank,
            sign: charData.sign,
            color: charData.color,
            spawnTime: Date.now() // ゲームオーバー判定の猶予用
        }
    });

    return ritter;
}

function dropRitter(x, level) {
    const ritter = createRitterBody(x, deadlineY - 40, level);
    Composite.add(engine.world, ritter);
}

// 衝突したときの合体（マージ）ロジック
function handleCollisions(event) {
    const pairs = event.pairs;
    
    for (let i = 0; i < pairs.length; i++) {
        const pair = pairs[i];
        const bodyA = pair.bodyA;
        const bodyB = pair.bodyB;
        
        // 両方ともリッターであり、かつ同じ階級（level）かチェック
        if (bodyA.label === "ritter" && bodyB.label === "ritter") {
            const lvlA = bodyA.plugin.level;
            const lvlB = bodyB.plugin.level;
            
            if (lvlA === lvlB && !bodyA.isDead && !bodyB.isDead) {
                // 既に処理済みの場合はスキップするためのフラグ
                bodyA.isDead = true;
                bodyB.isDead = true;
                
                const currentLevel = lvlA;
                
                // 最高レベル（元帥）同士なら消滅のみ、またはそのまま
                if (currentLevel >= EVOLUTION_LINE.length) {
                    continue; 
                }
                
                // 2つの接触物の中間地点に新しいリッターを生成
                const newX = (bodyA.position.x + bodyB.position.x) / 2;
                const newY = (bodyA.position.y + bodyB.position.y) / 2;
                const nextLvl = currentLevel + 1;
                
                // 消去スケジュール
                setTimeout(() => {
                    Composite.remove(engine.world, bodyA);
                    Composite.remove(engine.world, bodyB);
                    
                    const upgradedRitter = createRitterBody(newX, newY, nextLvl);
                    Composite.add(engine.world, upgradedRitter);
                    
                    // スコア加算
                    score += EVOLUTION_LINE[nextLvl - 1].score;
                    document.getElementById("score-value").innerText = score;
                }, 0);
            }
        }
    }
}

// 上部デッドラインを超えていないかチェック
function checkGameOverLine() {
    if (isGameOver) return;
    
    const bodies = Composite.allBodies(engine.world);
    const now = Date.now();
    
    for (let body of bodies) {
        if (body.label === "ritter" && !body.isStatic) {
            // 生成されてから2秒以上経過しているものだけを対象にする（落とした直後の誤判定防止）
            if (now - body.plugin.spawnTime > 2000) {
                // 円の頂点がデッドラインより上（Y座標が小さい）にいればアウト判定
                if (body.position.y - body.circleRadius < deadlineY) {
                    triggerGameOver();
                    break;
                }
            }
        }
    }
}

function triggerGameOver() {
    isGameOver = true;
    canDrop = false;
    Runner.stop(runner);
    document.getElementById("final-score").innerText = score;
    document.getElementById("game-over-screen").style.display = "flex";
}

function resetGame() {
    // 既存のオブジェクトを全削除
    if (engine) {
        Composite.clear(engine.world, false);
        Engine.clear(engine);
    }
    if (runner) Runner.stop(runner);
    if (render) {
        Render.stop(render);
    }
    initGame();
}

// 境界線や文字を自分でCanvasに描くためのカスタムレンダリングフック
function drawInitialGuideLine() {
    Events.on(render, 'afterRender', () => {
        const ctx = render.context;
        
        // デッドライン（警告線）の描画
        ctx.beginPath();
        ctx.moveTo(0, deadlineY);
        ctx.lineTo(width, deadlineY);
        ctx.strokeStyle = isGameOver ? "#ff4d4d" : "rgba(212, 175, 55, 0.4)";
        ctx.lineWidth = 2;
        ctx.setLineDash([5, 5]);
        ctx.stroke();
        ctx.setLineDash([]); // 元に戻す
        
        // 各リッターの円の中に名前と階級を描画する
        const bodies = Composite.allBodies(engine.world);
        bodies.forEach(body => {
            if (body.label === "ritter") {
                const { charName, rank, sign, color } = body.plugin;
                const radius = body.circleRadius;
                
                ctx.save();
                ctx.translate(body.position.x, body.position.y);
                ctx.rotate(body.angle);
                
                // 円の背景色
                ctx.beginPath();
                ctx.arc(0, 0, radius, 0, 2 * Math.PI);
                ctx.fillStyle = color;
                ctx.fill();
                ctx.strokeStyle = "#ffffff";
                ctx.lineWidth = 1.5;
                ctx.stroke();
                
                // 文字盤（名前・階級など）の描画
                ctx.fillStyle = "#000000"; // 文字色は見やすいように黒
                ctx.textAlign = "center";
                ctx.textBaseline = "middle";
                
                // サイズに応じてフォントサイズを微調整
                let fontSize = Math.max(10, radius * 0.22);
                ctx.font = `bold ${fontSize}px sans-serif`;
                
                if (radius > 35) {
                    // 大きい丸は階級、名前、星座を3行で
                    ctx.fillText(rank, 0, -radius * 0.4);
                    ctx.fillText(charName, 0, 0);
                    ctx.font = `${fontSize * 0.9}px sans-serif`;
                    ctx.fillText(sign, 0, radius * 0.4);
                } else {
                    // 小さい丸は名前の頭文字や省略、または名前のみをシンプルに
                    ctx.font = `bold ${fontSize * 0.9}px sans-serif`;
                    ctx.fillText(charName.substring(0, 2), 0, -radius * 0.2);
                    ctx.font = `${fontSize * 0.7}px sans-serif`;
                    ctx.fillText(rank, 0, radius * 0.3);
                }
                
                ctx.restore();
            }
        });
    });
}

// 起動
initGame();
</script>
</body>
</html>
