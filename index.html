<script>

  { name:"第1公國", commander:"加納友緒中佐", animal:"サソリ", specialty:"砂時計", industry:"墓掘り", climate:"砂漠", themes:["孤独","古代","執念","遺跡","死"], affinity:{ sun:["Scorpio","Capricorn","Virgo"], moon:["Scorpio","Capricorn","Pisces"], venus:["Virgo","Scorpio","Capricorn"], mars:["Scorpio","Capricorn","Aries"] }, memo:"..." },

];

function calculateRealSign(dateObj, planet) {
  try {
    const time = new Astronomy.AstroTime(dateObj);
    let body;
    if (planet === "Sun") body = Astronomy.Body.Sun;
    else if (planet === "Moon") body = Astronomy.Body.Moon;
    else if (planet === "Mercury") body = Astronomy.Body.Mercury;
    else if (planet === "Venus") body = Astronomy.Body.Venus;
    else if (planet === "Mars") body = Astronomy.Body.Mars;
    else return "Leo";
    const vector = Astronomy.GeoVector(body, time, false);
    const ecliptic = Astronomy.Ecliptic(vector);
    let lon = ecliptic.elon;
    if (lon < 0) lon += 360;
    return signs[Math.floor(lon / 30)];
  } catch(err) {
    return "Leo";
  }
}

function getLongitude(dateObj, planet) { /* 前回と同じ */ }
function calcAngle(a, b) { var d = Math.abs(a - b); return d > 180 ? 360 - d : d; }
function getAspectName(angle) { /* 前回と同じ */ }
function analyzeSpecialPatterns(dateObj) { /* 前回と同じ */ }
function getCompatibility(a, b) { /* 前回と同じ */ }
function createStat(label, value) {
  return `<div class="stat"><div class="stat-row"><span>${label}</span><span>${value}%</span></div><div class="bar-bg"><div class="bar-fill" style="width:${value}%"></div></div></div>`;
}

function runDiagnosis() {
  const btn = document.getElementById("diagnoseBtn");
  const resultDiv = document.getElementById("result");
  btn.disabled = true;
  resultDiv.innerHTML = '<p style="text-align:center;padding:40px;color:#c9a84c;">天体を解析中…</p>';

  setTimeout(() => {
    try {
      // 日付処理
      const dateStr = document.getElementById("birthdate").value;
      if (!dateStr) throw new Error("生年月日を入力してください");
      const hourVal = parseInt(document.getElementById("hour").value);
      if (isNaN(hourVal) || hourVal < 0 || hourVal > 23) throw new Error("出生時間は0〜23で入力してください");

      const parts = dateStr.split("-").map(Number);
      const targetDate = new Date(parts[0], parts[1]-1, parts[2], hourVal, 0, 0);

      const userSign = {
        sun: calculateRealSign(targetDate, "Sun"),
        moon: calculateRealSign(targetDate, "Moon"),
        mercury: calculateRealSign(targetDate, "Mercury"),
        venus: calculateRealSign(targetDate, "Venus"),
        mars: calculateRealSign(targetDate, "Mars")
      };

      // 戦略特性
      let html = '<div class="result-title">── 配属下命書 ──</div>';
      html += `<div class="traits-card"> ...戦略特性カード... </div>`; // 必要ならここに詳細を入れる

      // ====================== 公國適性 ======================
      html += '<div class="result-title">── 地政学的公國適性 ──</div>';

      const nationResults = nations.map(nat => {
        let score = 0;
        let reasons = [];
        if (nat.affinity && nat.affinity.sun && nat.affinity.sun.includes(userSign.sun)) { score += 30; reasons.push("国家理念への適応性が高い"); }
        if (nat.affinity && nat.affinity.moon && nat.affinity.moon.includes(userSign.moon)) { score += 25; reasons.push("國民性との精神親和性が高い"); }
        if (nat.affinity && nat.affinity.venus && nat.affinity.venus.includes(userSign.venus)) { score += 20; reasons.push("文化・生活感覚への適応性を持つ"); }
        if (nat.affinity && nat.affinity.mars && nat.affinity.mars.includes(userSign.mars)) { score += 25; reasons.push("軍事行動原理との一致が見られる"); }
        if (score < 35) score += 35;
        if (score > 100) score = 100;
        return { nation: nat, score: score, reasons: reasons };
      }).sort((a, b) => b.score - a.score);

      // 上位3公國
      for (let i = 0; i < Math.min(3, nationResults.length); i++) {
        const res = nationResults[i];
        const nat = res.nation;
        let rankText = res.score >= 85 ? "【極めて高い適性】" : res.score >= 70 ? "【高適性】" : res.score >= 55 ? "【標準適性】" : "【低適性】";

        html += `
        <div class="traits-card">
          <div class="cmd-header">
            <div><div class="cmd-name">${nat.name}</div><div class="cmd-title">最高司令官：${nat.commander}</div></div>
            <div class="compatibility" style="font-size:22px;">${res.score}%</div>
          </div>
          <div style="color:var(--gold-light); margin-bottom:12px; font-size:14px;">${rankText}</div>
          <div style="line-height:1.9; color:var(--cream-dim); font-size:14px;">
            <strong>氣候：</strong>${nat.climate}<br>
            <strong>象徴動物：</strong>${nat.animal}<br>
            <strong>特産：</strong>${nat.specialty}<br>
            <strong>主要産業：</strong>${nat.industry}
          </div>
          <div style="margin-top:14px; color:var(--gold);">${nat.themes.map(t => `#${t}`).join(' ')}</div>
          <div style="margin-top:16px; padding:14px; background:rgba(255,255,255,.03); border-left:2px solid var(--gold-dim); color:var(--cream-dim);">
            <div style="color:var(--gold-light); margin-bottom:8px;">【適性分析】</div>
            ${res.reasons.map(r => `・${r}`).join("<br>")}
          </div>
          <div class="performance">${nat.memo}</div>
        </div>`;
      }

      // 残り公國
      if (nationResults.length > 3) {
        html += `<details class="accordion"><summary>その他の公國 (${nationResults.length - 3}公國)</summary>`;
        for (let i = 3; i < nationResults.length; i++) {
          html += `<div class="traits-card" style="margin:10px 0;"><div class="cmd-name">${nationResults[i].nation.name}</div><div style="color:var(--gold-dim);">${nationResults[i].score}%</div></div>`;
        }
        html += `</details>`;
      }

      html += '<button class="reset-btn" onclick="location.reload()">もう一度診断する</button>';
      resultDiv.innerHTML = html;

    } catch(err) {
      console.error(err);
      resultDiv.innerHTML = `<p style="color:#ff6b6b;text-align:center;padding:40px;line-height:1.8;">${err.message}</p>`;
    } finally {
      btn.disabled = false;
    }
  }, 600);
}

document.getElementById("diagnoseBtn").addEventListener("click", runDiagnosis);
</script>
